<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZTMYクイズ</title>
<style>
body {
  background: black;
  color: #b84cff;
  font-family: monospace;
  text-align: center;
  transition: 0.3s;
}
button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  background: #111;
  color: #b84cff;
  border: 1px solid #b84cff;
  cursor: pointer;
}
button:hover {
  background: #b84cff;
  color: black;
}
</style>
</head>

<body>

<div id="quiz-area">
  <h1>ZTMYクイズ</h1>
  <p id="question"></p>

  <button onclick="answer(0)" id="a0"></button>
  <button onclick="answer(1)" id="a1"></button>
  <button onclick="answer(2)" id="a2"></button>
  <button onclick="answer(3)" id="a3"></button>
</div>

<div id="result-area" style="display:none;">
  <h1 id="result-text"></h1>
  <button onclick="next()">次へ</button>
</div>

<script type="module">
  const firebaseConfig = {
  apiKey: "AIzaSyAJBiQAmfuoNOtF4TOhqCPYRywOASvL52Y",
  authDomain: "ztmy-quiz.firebaseapp.com",
  projectId: "ztmy-quiz",
};
</script>
  
<script>

const quiz = [
  {
    q: "『秒針を噛む』のMVを制作した作家は？",
    a: ["革蝉", "TV♡CHANY", "Waboku", "ゴル"],
    correct: 2
  },
  {
    q: "『お勉強しといてよ』のテーマはどれ？",
    a: ["恋愛", "勉強", "社会風刺", "友情"],
    correct: 2
  },
  {
    q: "ボーカルの名前は？",
    a: ["ACAね", "あいみょん", "ikura", "美波"],
    correct: 0
  },
  {
    q: "『秒針を噛む』のリリース年は？",
    a: ["2016年", "2017年", "2018年", "2019年"],
    correct: 2
  },
  {
    q: "『脳裏上のクラッカー』のテーマとして近いものは？",
    a: ["現実逃避", "恋愛", "復讐", "友情"],
    correct: 0
  },
  {
    q: "ZTMYの特徴として正しいのは？",
    a: ["実写MV中心", "匿名性が高い", "男性ボーカル", "海外グループ"],
    correct: 1
  },
  {
    q: "『正しくなれない』が主題歌の作品は？",
    a: ["映画", "ドラマ", "アニメ", "CM"],
    correct: 0
  },
  {
    q: "ZTMYの楽曲でよく扱われるテーマは？",
    a: ["社会・内面", "スポーツ", "料理", "歴史"],
    correct: 0
  },
  {
    q: "『ハゼ馳せる果てるまで』の雰囲気は？",
    a: ["明るい", "切ない", "ホラー", "ギャグ"],
    correct: 1
  },
  {
    q: "ZTMYのライブの特徴は？",
    a: ["映像演出が多い", "静かな演奏", "クラシック中心", "MCなし"],
    correct: 0
  }
];

let i = 0;
let score = 0;

function load() {
  document.getElementById("question").innerText =
    "Q" + (i+1) + ". " + quiz[i].q;

  for (let j=0;j<4;j++) {
    document.getElementById("a"+j).innerText = quiz[i].a[j];
  }
}

function answer(n) {
  document.getElementById("quiz-area").style.display = "none";
  document.getElementById("result-area").style.display = "block";

  if (n === quiz[i].correct) {
    score++;
    document.body.style.background = "#2a003f";
    document.getElementById("result-text").innerText = "正解！🔥";
  } else {
    document.body.style.background = "#3f0000";
    document.getElementById("result-text").innerText =
      "不正解…😢 正解は「" + quiz[i].a[quiz[i].correct] + "」";
  }
}

function next() {
  i++;

  if (i < quiz.length) {
    document.body.style.background = "black";
    document.getElementById("quiz-area").style.display = "block";
    document.getElementById("result-area").style.display = "none";
    load();
  } else {
    let percent = Math.round((score / quiz.length) * 100);

    let rank = "";
    if (percent === 100) {
      rank = "神（ガチ勢）";
    } else if (percent >= 80) {
      rank = "かなり詳しい";
    } else if (percent >= 50) {
      rank = "まあまあ";
    } else {
      rank = "にわか";
    }

    document.body.innerHTML =
      "<h1>結果</h1>" +
      "<h2>" + score + "/" + quiz.length + "</h2>" +
      "<h2>正解率: " + percent + "%</h2>" +
      "<h3>" + rank + "</h3>" +
      "<button onclick='location.reload()'>もう一回</button>";
  }
}

load();

</script>

</body>
</html>
