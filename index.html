<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZTMYクイズ</title>
<style>
body {
  background: black;
  color: #b84cff;
  font-family: monospace;
  text-align: center;
  transition: 0.3s;
}
button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  background: #111;
  color: #b84cff;
  border: 1px solid #b84cff;
  cursor: pointer;
}
button:hover {
  background: #b84cff;
  color: black;
}
input {
  padding: 10px;
  background: #111;
  border: 1px solid #b84cff;
  color: #b84cff;
}
img {
  cursor: pointer;
}
</style>
</head>

<body>

<div id="start-area">
  <h1>ZTMYクイズ</h1>
  <button onclick="start('easy')">Easy</button>
  <button onclick="start('hard')">ガチ勢モード</button>
</div>

<div id="quiz-area" style="display:none;">
  <p id="question"></p>
  <button onclick="answer(0)" id="a0"></button>
  <button onclick="answer(1)" id="a1"></button>
  <button onclick="answer(2)" id="a2"></button>
  <button onclick="answer(3)" id="a3"></button>
</div>

<div id="result-area" style="display:none;">
  <h1 id="result-text"></h1>
  <button onclick="next()">次へ</button>
</div>

<!-- 🔥 名前＋アイコン -->
<div id="name-area" style="display:none;">
  <h2>名前とアイコン選択</h2>
  <input id="nameInput" placeholder="名前">

  <h3>アイコン</h3>
  <div id="icon-select"></div>

  <button onclick="submitName()">送信</button>
  <p id="error" style="color:red;"></p>
</div>

<script type="module">

import { quizData } from "./questions.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJBiQAmfuoNOtF4TOhqCPYRywOASvL52Y",
  authDomain: "ztmy-quiz.firebaseapp.com",
  projectId: "ztmy-quiz",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 アイコン（imagesフォルダ必須）
const iconList = [
  "images/icon1.png",
  "images/icon2.png",
  "images/icon3.png",
  "images/icon4.png"
];

let selectedIcon = "";

// アイコン表示
function loadIcons(){
  let area = document.getElementById("icon-select");
  area.innerHTML = "";

  iconList.forEach(icon=>{
    let img = document.createElement("img");
    img.src = icon;
    img.width = 50;

    img.onclick = () => {
      selectedIcon = icon;
      document.querySelectorAll("#icon-select img")
        .forEach(i=>i.style.border="none");
      img.style.border="2px solid #b84cff";
    };

    area.appendChild(img);
  });
}

let quiz=[], i=0, score=0, mode="easy";

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.random()* (i+1)|0;[a[i],a[j]]=[a[j],a[i]];}}

window.start=function(m){
  mode=m;

  document.getElementById("start-area").style.display="none";
  document.getElementById("quiz-area").style.display="block";

  let pool=[...quizData[m]];
  shuffle(pool);

  quiz = pool.slice(0,10); // 🔥ここ重要

  i=0;
  score=0;
  load();
}

function load(){
  document.getElementById("question").innerText="Q"+(i+1)+". "+quiz[i].q;
  for(let j=0;j<4;j++) document.getElementById("a"+j).innerText=quiz[i].a[j];
}

window.answer=function(n){
  document.getElementById("quiz-area").style.display="none";
  document.getElementById("result-area").style.display="block";

  if(n===quiz[i].correct){
    score++;
    document.body.style.background="#2a003f";
    document.getElementById("result-text").innerText="正解！🔥";
  }else{
    document.body.style.background="#3f0000";
    document.getElementById("result-text").innerText=
      "不正解… 正解は「"+quiz[i].a[quiz[i].correct]+"」";
  }
}

window.next=function(){
  i++;
  if(i<quiz.length){
    document.body.style.background="black";
    document.getElementById("quiz-area").style.display="block";
    document.getElementById("result-area").style.display="none";
    load();
  }else{
    finish();
  }
}

// ===== 終了 =====
function finish(){
  document.getElementById("result-area").style.display="none";
  document.getElementById("name-area").style.display="block";
  loadIcons();
}

// ===== ここが核心 =====
window.submitName = async function(){

  let name = document.getElementById("nameInput").value.trim();
  let error = document.getElementById("error");

  if(!name || !selectedIcon){
    error.innerText="入力＆選択して";
    return;
  }

  let percent = Math.round((score/quiz.length)*100);

  const col = collection(db,"ranking_"+mode);
  const snap = await getDocs(col);

  let found=null;

  snap.forEach(d=>{
    if(d.data().name===name) found=d;
  });

  if(found){
    if(percent > found.data().score){
      await updateDoc(doc(db,"ranking_"+mode,found.id),{
        score:percent,
        icon:selectedIcon
      });
    }
  }else{
    await addDoc(col,{
      name:name,
      score:percent,
      icon:selectedIcon
    });
  }

  showRanking();
}

// ===== ランキング =====
async function showRanking(){
  const q=query(collection(db,"ranking_"+mode),orderBy("score","desc"),limit(100));
  const snap=await getDocs(q);

  let html="<h1>ランキング</h1>";
  let rank=1;

  snap.forEach(doc=>{
    let d=doc.data();

    let style="";
    if(rank===1) style="color:gold;font-size:24px;";
    if(rank===2) style="color:silver;";
    if(rank===3) style="color:#cd7f32;";

    html+=`
      <div style="${style}">
        <img src="${d.icon}" width="40">
        ${rank}位: ${d.name} - ${d.score}%
      </div>
    `;
    rank++;
  });

  html+="<button onclick='location.reload()'>もう一回</button>";
  document.body.innerHTML=html;
}

</script>

</body>
</html>
