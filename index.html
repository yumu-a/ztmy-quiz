<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZTMYクイズ</title>
<style>
body {
  background: black;
  color: #b84cff;
  font-family: monospace;
  text-align: center;
}
button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  background: #111;
  color: #b84cff;
  border: 1px solid #b84cff;
  cursor: pointer;
}
button:hover {
  background: #b84cff;
  color: black;
}
</style>
</head>

<body>

<div id="quiz-area">
  <h1>ZTMYクイズ</h1>
  <p id="question"></p>

  <button onclick="answer(0)" id="a0"></button>
  <button onclick="answer(1)" id="a1"></button>
  <button onclick="answer(2)" id="a2"></button>
  <button onclick="answer(3)" id="a3"></button>
</div>

<div id="result-area" style="display:none;">
  <h1 id="result-text"></h1>
  <button onclick="next()">次へ</button>
</div>

<script>

const quiz = [
  {
    q: "『秒針を噛む』のMVを制作した作家は？",
    a: ["革蝉", "TV♡CHANY", "Waboku", "ゴル"],
    correct: 2
  },
  {
    q: "『お勉強しといてよ』のテーマはどれ？",
    a: ["恋愛", "勉強", "社会風刺", "友情"],
    correct: 2
  },
  {
    q: "ボーカルの名前は？",
    a: ["ACAね", "あいみょん", "ikura", "美波"],
    correct: 0
  }
];

let i = 0;
let score = 0;

function load() {
  document.getElementById("question").innerText = quiz[i].q;
  for (let j=0;j<4;j++) {
    document.getElementById("a"+j).innerText = quiz[i].a[j];
  }
}

function answer(n) {
  document.getElementById("quiz-area").style.display = "none";
  document.getElementById("result-area").style.display = "block";

  if (n === quiz[i].correct) {
    score++;
    document.getElementById("result-text").innerText = "正解！🔥";
  } else {
    document.getElementById("result-text").innerText = "不正解…😢";
  }
}

function next() {
  i++;

  if (i < quiz.length) {
    document.getElementById("quiz-area").style.display = "block";
    document.getElementById("result-area").style.display = "none";
    load();
  } else {
    let percent = Math.round((score / quiz.length) * 100);

    let rank = "";
    if (percent === 100) {
      rank = "神（ガチ勢）";
    } else if (percent >= 80) {
      rank = "かなり詳しい";
    } else if (percent >= 50) {
      rank = "まあまあ";
    } else {
      rank = "にわか";
    }

    document.body.innerHTML =
      "<h1>結果</h1>" +
      "<h2>" + score + "/" + quiz.length + "</h2>" +
      "<h2>" + percent + "%</h2>" +
      "<h3>" + rank + "</h3>";
  }
}

load();

</script>

</body>
</html>
