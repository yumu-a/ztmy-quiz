<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZTMYクイズ</title>
<style>
body {
  background: black;
  color: #b84cff;
  font-family: monospace;
  text-align: center;
  transition: 0.3s;
}
button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  background: #111;
  color: #b84cff;
  border: 1px solid #b84cff;
  cursor: pointer;
}
button:hover {
  background: #b84cff;
  color: black;
}
input {
  padding: 10px;
  background: #111;
  border: 1px solid #b84cff;
  color: #b84cff;
}
</style>
</head>

<body>

<div id="start-area">
  <h1>ZTMYクイズ</h1>
  <button onclick="start('easy')">Easy</button>
  <button onclick="start('hard')">ガチ勢モード</button>
</div>

<div id="quiz-area" style="display:none;">
  <p id="question"></p>
  <button onclick="answer(0)" id="a0"></button>
  <button onclick="answer(1)" id="a1"></button>
  <button onclick="answer(2)" id="a2"></button>
  <button onclick="answer(3)" id="a3"></button>
</div>

<div id="result-area" style="display:none;">
  <h1 id="result-text"></h1>
  <button onclick="next()">次へ</button>
</div>

<div id="name-area" style="display:none;">
  <h2>名前を入力</h2>
  <input id="nameInput" placeholder="名前">
  <button onclick="submitName()">送信</button>
  <p id="error" style="color:red;"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJBiQAmfuoNOtF4TOhqCPYRywOASvL52Y",
  authDomain: "ztmy-quiz.firebaseapp.com",
  projectId: "ztmy-quiz",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const quizData = {
  easy: [
    {q:"ボーカルは？",a:["ACAね","Ado","ikura","美波"],correct:0},
    {q:"ZTMY特徴？",a:["匿名性","実写","男性","海外"],correct:0},
    {q:"テーマは？",a:["内面","スポーツ","料理","歴史"],correct:0}
  ],
  hard: [
    {q:"MV作家？",a:["革蝉","TV♡CHANY","Waboku","ゴル"],correct:2},
    {q:"クラッカーのテーマ？",a:["現実逃避","友情","復讐","恋愛"],correct:0}
  ]
};

let quiz=[], i=0, score=0, mode="easy";

// シャッフル
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

// スタート
window.start = function(m){
  mode = m;
  document.getElementById("start-area").style.display="none";
  document.getElementById("quiz-area").style.display="block";

  let pool=[...quizData[m]];
  shuffle(pool);
  quiz=pool;

  i=0; score=0;
  load();
}

// 問題表示
function load(){
  document.getElementById("question").innerText="Q"+(i+1)+". "+quiz[i].q;
  for(let j=0;j<4;j++){
    document.getElementById("a"+j).innerText=quiz[i].a[j];
  }
}

// 回答
window.answer=function(n){
  document.getElementById("quiz-area").style.display="none";
  document.getElementById("result-area").style.display="block";

  if(n===quiz[i].correct){
    score++;
    document.body.style.background="#2a003f";
    document.getElementById("result-text").innerText="正解！🔥";
  }else{
    document.body.style.background="#3f0000";
    document.getElementById("result-text").innerText="不正解… 正解は「"+quiz[i].a[quiz[i].correct]+"」";
  }
}

// 次へ
window.next=function(){
  i++;
  if(i<quiz.length){
    document.body.style.background="black";
    document.getElementById("quiz-area").style.display="block";
    document.getElementById("result-area").style.display="none";
    load();
  }else{
    finish();
  }
}

// 終了
function finish(){
  document.getElementById("result-area").style.display="none";
  document.getElementById("name-area").style.display="block";
}

// 名前送信
window.submitName = async function(){
  let name=document.getElementById("nameInput").value.trim();
  let error=document.getElementById("error");
  error.innerText="";

  if(!name){error.innerText="名前入力して"; return;}

  // 🔥 同じモードで一回だけ
  if(localStorage.getItem("played_"+mode)){
    error.innerText="このモードはもう登録済み";
    return;
  }

  // 🔥 同名チェック
  const snap = await getDocs(collection(db,"ranking_"+mode));
  let exists=false;
  snap.forEach(doc=>{
    if(doc.data().name===name) exists=true;
  });
  if(exists){
    error.innerText="その名前は使われています";
    return;
  }

  let percent=Math.round((score/quiz.length)*100);

  await addDoc(collection(db,"ranking_"+mode),{
    name:name,
    score:percent
  });

  localStorage.setItem("played_"+mode,true);

  // ランキング取得
  const q=query(collection(db,"ranking_"+mode),orderBy("score","desc"),limit(5));
  const res=await getDocs(q);

  let text="";
  let rank=1;
  res.forEach(doc=>{
    let d=doc.data();
    text+=rank+"位: "+d.name+" - "+d.score+"%<br>";
    rank++;
  });

  document.body.innerHTML=
    "<h1>結果</h1>"+
    "<h2>"+percent+"%</h2>"+
    "<h2>"+mode+"ランキング</h2>"+
    "<p>"+text+"</p>"+
    "<button onclick='location.reload()'>もう一回</button>";
}

</script>

</body>
</html>
